<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGuard | AI Phishing Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.6);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.4);
            --safe: #10b981;
            --suspicious: #f59e0b;
            --phishing: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #1e1b4b 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated background blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 10s infinite alternate;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: rgba(56, 189, 248, 0.15);
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            width: 500px;
            height: 500px;
            background: rgba(139, 92, 246, 0.15);
            bottom: -150px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(50px, 30px) scale(1.1);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            padding: 2rem 0;
        }

        .header {
            text-align: center;
            margin-bottom: 1rem;
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .input-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        input {
            flex: 1;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            color: white;
            font-size: 1.1rem;
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        button {
            background: linear-gradient(135deg, #38bdf8 0%, #3b82f6 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--primary-glow);
        }

        button:active {
            transform: translateY(1px);
        }

        /* Results Area */
        #result-container {
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            animation: slideUp 0.5s forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .score-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--card-border);
        }

        .score-dial {
            position: relative;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: conic-gradient(var(--score-color) var(--percentage), rgba(255, 255, 255, 0.05) 0);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
        }

        .score-dial::after {
            content: '';
            position: absolute;
            inset: 10px;
            background: var(--bg-color);
            border-radius: 50%;
        }

        .score-value {
            position: relative;
            z-index: 1;
            font-size: 3rem;
            font-weight: 700;
            color: var(--score-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
        }

        .score-value span {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 400;
            margin-top: 4px;
        }

        .status-badge {
            font-size: 2rem;
            font-weight: 700;
            padding: 0.5rem 1.5rem;
            border-radius: 12px;
            border: 2px solid var(--score-color);
            color: var(--score-color);
            background: rgba(0, 0, 0, 0.2);
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .reasons-list {
            list-style: none;
            margin-bottom: 2rem;
        }

        .reasons-list li {
            padding: 0.8rem 1rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 8px;
            margin-bottom: 0.5rem;
            color: #fca5a5;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .reasons-list li::before {
            content: '⚠️';
        }

        .reasons-list.safe li {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.2);
            color: #6ee7b7;
        }

        .reasons-list.safe li::before {
            content: '✅';
        }

        /* Telemetry grid */
        .telemetry-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }

        .telemetry-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .telemetry-card:hover {
            transform: translateY(-2px);
            background: rgba(30, 41, 59, 0.8);
        }

        .telemetry-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
            text-transform: capitalize;
        }

        .telemetry-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            word-break: break-all;
        }

        .telemetry-value.true {
            color: var(--phishing);
        }

        .telemetry-value.false {
            color: var(--safe);
        }

        .telemetry-value.highlight {
            color: var(--primary);
        }

        /* Loader */
        .loader-container {
            display: none;
            text-align: center;
            padding: 3rem 0;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: var(--primary);
            font-weight: 500;
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        @media (max-width: 600px) {
            .score-row {
                flex-direction: column;
                gap: 2rem;
                text-align: center;
            }

            .header h1 {
                font-size: 2.5rem;
            }

            .input-group {
                flex-direction: column;
            }

            button {
                padding: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <div class="header">
            <h1>PhishGuard AI</h1>
            <p>Advanced real-time URL analysis & threat detection</p>
        </div>

        <div class="glass-card">
            <div class="input-group">
                <input type="url" id="url" placeholder="Enter suspicious URL (e.g., http://example.com)" required
                    autocomplete="off" spellcheck="false" />
                <button onclick="analyze()">Scan URL</button>
            </div>

            <div class="loader-container" id="loader">
                <div class="spinner"></div>
                <div class="loading-text">Extracting telemetry & analyzing...</div>
            </div>

            <div id="result-container" class="glass-card"
                style="margin-top: 2rem; padding: 0; background: transparent; border: none; box-shadow: none;">
                <div class="score-row">
                    <div class="score-dial" id="scoreDial">
                        <div class="score-value">
                            <span id="riskScore">0</span>
                            <span style="font-size:0.8rem">% RISK</span>
                        </div>
                    </div>
                    <div class="status-badge" id="statusBadge">SAFE</div>
                </div>

                <div class="section-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z">
                        </path>
                        <line x1="12" y1="9" x2="12" y2="13"></line>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                    Detection Insights
                </div>
                <ul class="reasons-list" id="reasonsList">
                    <!-- Reasons populated here -->
                </ul>

                <div class="section-title" style="margin-top: 2rem;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                        <line x1="8" y1="21" x2="16" y2="21"></line>
                        <line x1="12" y1="17" x2="12" y2="21"></line>
                    </svg>
                    Raw Telemetry
                </div>
                <div class="telemetry-grid" id="telemetryGrid">
                    <!-- Telemetry nodes populated here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Use Javascript mapped colors
        const colors = {
            Safe: 'var(--safe)',
            Suspicious: 'var(--suspicious)',
            Phishing: 'var(--phishing)',
            Error: 'var(--phishing)'
        };

        async function analyze() {
            const urlInput = document.getElementById("url");
            const url = urlInput.value.trim();
            if (!url) return urlInput.focus();

            const loader = document.getElementById("loader");
            const resultContainer = document.getElementById("result-container");
            const reasonsList = document.getElementById("reasonsList");
            const telemetryGrid = document.getElementById("telemetryGrid");

            // UI Reset
            resultContainer.style.display = "none";
            loader.style.display = "block";
            reasonsList.innerHTML = "";
            telemetryGrid.innerHTML = "";

            try {
                const res = await fetch("/analyze", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url }),
                });

                const data = await res.json();

                // Hide loader
                loader.style.display = "none";
                resultContainer.style.display = "block";

                // Update UI based on Response
                updateScoreAndStatus(data.risk_score, data.status);
                populateReasons(data.reasons, data.status);

                if (data.url_features) {
                    populateTelemetry(data.url_features, data.crawl_features);
                }

            } catch (e) {
                loader.style.display = "none";
                alert("Error connecting to detection engine: " + e.message);
            }
        }

        function updateScoreAndStatus(score, status) {
            const dial = document.getElementById("scoreDial");
            const scoreText = document.getElementById("riskScore");
            const badge = document.getElementById("statusBadge");

            const color = colors[status] || colors.Safe;

            // Animate dial
            dial.style.setProperty('--score-color', color);

            let currentScore = 0;
            const targetScore = Math.round(score);
            const duration = 1000;
            const interval = 20;
            const steps = duration / interval;
            const stepValue = targetScore / steps;

            const animation = setInterval(() => {
                currentScore += stepValue;
                if (currentScore >= targetScore) {
                    currentScore = targetScore;
                    clearInterval(animation);
                }

                const percent = (currentScore / 100) * 360;
                dial.style.setProperty('--percentage', `${percent}deg`);
                scoreText.innerText = Math.round(currentScore);
            }, interval);

            badge.innerText = status;
            badge.style.borderColor = color;
            badge.style.color = color;
            badge.style.boxShadow = `0 0 15px ${color}40`;
        }

        function populateReasons(reasons, status) {
            const list = document.getElementById("reasonsList");
            list.className = `reasons-list ${status === 'Safe' ? 'safe' : ''}`;

            if (!reasons || reasons.length === 0) {
                const li = document.createElement("li");
                li.innerText = status === 'Safe' ? "No suspicious indicators found." : "Flagged by AI Engine.";
                list.appendChild(li);
                return;
            }

            reasons.forEach(r => {
                const li = document.createElement("li");
                li.innerText = r;
                list.appendChild(li);
            });
        }

        function populateTelemetry(urlF, crawlF) {
            const grid = document.getElementById("telemetryGrid");

            const formatValue = (v) => {
                if (v === true || v === 1) return `<span class="telemetry-value highlight">Yes</span>`;
                if (v === false || v === 0) return `<span class="telemetry-value">No</span>`;
                return `<span class="telemetry-value highlight">${v}</span>`;
            };

            const addCard = (key, value) => {
                const displayKey = key.replace(/_/g, ' ');
                const card = document.createElement("div");
                card.className = "telemetry-card";
                card.innerHTML = `
                    <div class="telemetry-label">${displayKey}</div>
                    ${formatValue(value)}
                `;
                grid.appendChild(card);
            };

            // Selected interesting telemetry
            if (urlF) {
                addCard('URL Length', urlF.url_length);
                addCard('Path Length', urlF.path_length);
                addCard('Domain Length', urlF.domain_length);
                addCard('Subdomains', urlF.subdomain_count);
                addCard('Numeric Digits', urlF.num_digits);
                addCard('Has IP Address', urlF.has_ip);
                addCard('Is Shortened', urlF.is_shortened);
            }
            if (crawlF && Object.keys(crawlF).length > 0) {
                addCard('Redirects', crawlF.redirect_count);
                addCard('Login Form', crawlF.login_form_detected);
                addCard('External Links', crawlF.external_links);
                addCard('iFrames', crawlF.iframes_detected);
            }
        }
    </script>
</body>

</html>
